<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{fragments/layout}">
<!--    #1. layout 렌더링  http://localhost:8080/api/util/kmaWeather  -->
<head lang="ko">
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
   <div layout:fragment="content"   >
         <h3 class="card-header my-3">KMA 기상청 단기</h3>
         <table class="table table-striped  table-bordered  table-hover  weather_result">
            <caption>우리동네 단기예보</caption>
            <thead>
               <tr>
                  <th  scope="col"> CATEGORY</th>
                  <th  scope="col"> TIME</th>
                  <th  scope="col"> DATA</th>
               </tr>
            </thead>
            <tbody></tbody>
         </table>
         <script>
         window.addEventListener('load', () => { 
               const tbody = document.querySelector(".weather_result tbody");
               if (tbody) { tbody.innerHTML = ""; } 
               fetch("/api/util/kmaWeather")
                   .then(response => {
                       if (!response.ok) {
                           return response.text().then(errText => { throw new Error(errText); });
                       } 
                       return response.text();
                   })
                   .then(data => {  //성공시 파싱
                       const parser = new DOMParser();
                       const xml = parser.parseFromString(data, "application/xml");
   					   console.log(xml);
   						//item 들 가져오기
   					  const items =xml.querySelectorAll("item");
   						items.forEach(el=>{
   							const tr = document.createElement("tr");
   							const td1 = document.createElement("td");
   							const td2 = document.createElement("td");
   							const td3 = document.createElement("td");
   							
   							td1.textContent = el.querySelector("category")?.textContent || "";
   							td2.textContent = el.querySelector("baseTime")?.textContent || "";
   							td3.textContent = el.querySelector("obsrValue")?.textContent || "";
   							
   							tr.appendChild(td1);
   							tr.appendChild(td2);
   							tr.appendChild(td3);
   							tbody?.appendChild(tr);
   						});
                   })
                   .catch(error => {
                       console.error("에러 발생:", error);
                       if (tbody) {
                           tbody.textContent = error.message;
                       }
                   });
           });
         </script>
   </div> 
   <!--    http://localhost:8080/api/weather    -->
   <!--    http://localhost:8080/api/weatherapi -->
</body>
</html>
