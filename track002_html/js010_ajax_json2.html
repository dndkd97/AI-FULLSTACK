<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Shopping Cart - Button Animation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* 버튼 클릭 애니메이션 */
    .btn-animate {
      transition: transform 0.2s ease, background-color 0.3s ease;
    }
    .btn-animate:active {
      transform: scale(0.95) rotate(-2deg);
      background-color: #0d6efd;
      color: #fff;
    }

    /* 카드 hover 효과 */
    .card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      cursor: pointer;
    }
    .card img {
      transition: transform 0.3s ease;
    }
    .card:hover img {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
<div class="container my-4">
  <h3 class="mb-3">🛒 Shopping Cart</h3>
  <button class="btn btn-outline-primary btn-animate mb-3" onclick="loadCart()">장바구니 불러오기</button>
  <div class="row" id="cartContainer"></div>
  <div class="alert alert-info mt-3" id="totalPrice">총합계: 0원</div>
</div>

</html>
