<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 내부적용</title>
    <style>
        /*    선택자{ 속성  : 값  }      */
        div { width:300px; 
              margin:50px auto; 
              border-radius: 20px;
              box-shadow: 0 0 10px rgba(86, 154, 255, 0.5);
              padding:20px;
              background-color: rgb(253, 222, 237);
            }
            div:hover{
                background-color: rgb(252, 186, 186);
                transition: all 2s;
            }
            /* Q1. h3 :글자색상 : #123465 , border-left:3px soild #1234456*/
            h3 {color: rgb(110, 192, 202); border-left: 3px solid #ffffff; padding-left: 10px;}

             /* Q2. p  :글자사이즈 14px , 정렬 - center */
            p {font-size: 14px; text-align: center; }
            
    </style>
</head>
<body>
    <div>
        <h3>인라인</h3>
        <p>태그 안에 직접 적용</p>
        <p style="color: red;">color:red</p>
    </div>

    <div>
        <h3>내부스타일</h3>
        <p>head 안에 style 태그 사용 작성</p>
        <pre>
            p  {color : red;}
          선택자{ 속성  : 값  } 
        </pre>
    </div>

    <div>
        <h3>외부스타일</h3>
        <p>별도의 .css 파일을 만들어서 link태그로 연결</p>
    </div>
    
</body>
</html>
