 fetch("./data/member.xml")
.then(res=>res.text())
.then(xml=>{
  let parser=new DOMParser();
  let xmlDoc = parser.parseFromString(xml,"application/xml");
  let result="";
  let member =xmlDoc.getElementsByTagName("member");
  for(let me of member){
    let img = me.getElementsByTagName("img")[0].textContent; 
    let name = me.getElementsByTagName("name")[0].textContent;
    let age = me.getElementsByTagName("age")[0].textContent;
    let address = me.getElementsByTagName("address")[0].textContent;
    let mobile = me.getElementsByTagName("mobile")[0].textContent;
    result+=`<tr>
      <td><img src="${img}" width="80"></td>
      <td>${name}</td>
      <td>${age}</td>
      <td>${address}</td>
      <td>${mobile}</td>
      </tr>`;
  }
  document.querySelector("#memberTable tbody").innerHTML=result;
});
