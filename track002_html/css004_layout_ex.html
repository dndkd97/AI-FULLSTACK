<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css004_ex</title>
<style>
    * {margin:0; padding:0; }
body{  font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        background-image:linear-gradient(135deg, #ffe3fb , #c3d8fd);}
h1{ border-left:10px solid #123456; 
    border-bottom:1px solid #123456;
     margin:30px 0; padding-left:20px;}
.container{  width:50%; margin:50px auto;   border-radius: 10px;
    background-color:#e2cad8;  padding:20px;  box-shadow:0 0 10px rgba(0,0,0,0.2);
    overflow: hidden;}
ul{ width:40%; list-style: none; overflow: hidden; background-color: rgb(243, 202, 202);}/* clear : both */
li{float:left; margin:10px;}
img{width: 100px; height:100px; border-radius: 50%; border:3px solid #ff6600;
    transition:transform 0.8s, border-color  0.8s;}
.t1{float:left;}
.t2{float:right; background-color: #eff5f7;}
ul.team li:first-child img:hover{transform:translateY(-20px); 
border-color:#00ccff ;}
ul.team li:nth-child(2) img:hover{transform:rotateZ(20deg);
border-color:#33cc33}
ul.team li:nth-child(3) img:hover{transform:rotateX(180deg);
border-color:#ff33aa ;}
ul.team li:nth-child(4) img:hover{transform:rotateY(180deg);
border-color: #ffaa00;}
ul.team li:last-child img:hover{transform: rotate(360deg) scale(1.2);
border-color:#6600ff;}
</style>

</head> 

   
<body>
    <div class="container">
        <h1>어벤져스</h1>
        <ul class="team t1">
            <li class><img src="./img/one.png" alt="1"></li>
            <li class><img src="./img/two.png" alt="2"></li>
            <li class><img src="./img/three.png" alt="3"></li>
            <li class><img src="./img/four.png" alt="4"></li>
            <li class><img src="img/five.png" alt="5"></li>
        </ul>
         <ul class="team t2">
            <li><img src="https://picsum.photos/100?random=1" alt="얼굴1"></li>
            <li><img src="https://picsum.photos/100?random=2" alt="얼굴2"></li>
            <li><img src="https://picsum.photos/100?random=3" alt="얼굴3"></li>
            <li><img src="https://picsum.photos/100?random=4" alt="얼굴4"></li>
            <li><img src="https://picsum.photos/100?random=5" alt="얼굴5"></li>
        </ul>
    </div>
    
 
    
</body>
</html>
